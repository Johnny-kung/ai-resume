name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: client/package-lock.json

            - name: Install root dependencies
              run: npm install

            - name: Install client dependencies
              run: npm install --prefix client

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache-dependency-path: server/go.sum

            - name: Install Go dependencies
              run: cd server && go mod download

            - name: Start Go backend in background
              run: cd server && go run main.go &

            - name: Start Vite dev server in background
              run: npm run dev --prefix client &

            - name: Wait for servers to be ready
              run: |
                  echo "Waiting for Go backend on port 8080..."
                  for i in $(seq 1 30); do
                    if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                      echo "Go backend is ready!"
                      break
                    fi
                    sleep 1
                  done

                  echo "Waiting for Vite on port 5173..."
                  for i in $(seq 1 30); do
                    if curl -sf http://localhost:5173 > /dev/null 2>&1; then
                      echo "Vite is ready!"
                      exit 0
                    fi
                    sleep 1
                  done
                  echo "Vite did not start in time" && exit 1
